version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: configs
      ref: v1.2.1
      uri: https://github.com/trunk-io/configs
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - prettier
    - pylint
  enabled:
    - gitleaks@8.30.1
    - ty@0.0.24
    - pre-commit-hooks@5.0.0
    - trivy@0.69.3
    - actionlint@1.7.11
    - bandit@1.9.4
    - checkov@3.2.510
    - git-diff-check
    - hadolint@2.14.0
    - markdownlint@0.48.0
    - oxipng@10.1.0
    - renovate@43.86.1
    - ruff@0.15.7
    - trufflehog@3.94.0
    - yamllint@1.38.0
actions:
  enabled:
    - trunk-check-pre-push-always
    - trunk-check-pre-commit
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
